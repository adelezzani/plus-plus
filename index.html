<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLUS+</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-2: #0d1c33;
        --card: rgba(10, 22, 42, 0.78);
        --text: #f7fbff;
        --muted: #b7c5da;
        --accent: #7dd3fc;
        --accent-2: #34d399;
        --ring: rgba(125, 211, 252, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(52, 211, 153, 0.18), transparent 30%),
          radial-gradient(circle at 20% 20%, rgba(125, 211, 252, 0.16), transparent 28%),
          linear-gradient(160deg, var(--bg), var(--bg-2));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(920px, 100%);
        padding: 28px;
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: clamp(28px, 6vw, 56px);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 0 8px var(--ring);
      }

      h1 {
        margin: 22px 0 14px;
        font-size: clamp(3rem, 10vw, 6.5rem);
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      p {
        margin: 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: clamp(1rem, 2.2vw, 1.2rem);
        line-height: 1.7;
      }

      .footer {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 14px;
      }

      .pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .footer-links {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .footer-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
      }

      .footer-links a:hover {
        border-color: var(--accent);
      }

      @media (max-width: 640px) {
        .shell {
          padding: 8px;
        }

        .card {
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="badge"><span class="dot"></span>PLUS+</div>
        <h1>PLUS+</h1>
        <p>
          A simple landing page for the TMDB API request. This site exists only to provide a clean public URL for the application.
        </p>
        <div class="footer">
          <span class="pill">TMDB-ready</span>
          <span class="pill">GitHub Pages</span>
          <span class="pill">Public website</span>
        </div>
        <div class="footer-links">
          <a href="/terms.html">Terms of Use</a>
          <a href="/privacy.html">Privacy Policy</a>
        </div>
      </section>
    </main>
  </body>
</html>
